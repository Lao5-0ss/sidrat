<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Horizon</title>
    <meta
      name="description"
      content="一个可直接发布到 GitHub Pages 的 Stock 主题静态页面。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="hero">
      <section class="hero-copy">
        <p class="eyebrow">GitHub Pages Ready</p>
        <h1>Stock Horizon</h1>
        <p class="lead">
          一个以 stock 开头主题打造的展示页，适合做股票工具入口、量化项目首页或投资博客封面。
        </p>
        <div class="actions">
          <a class="button primary" href="#features">查看内容</a>
          <a class="button secondary" href="https://github.com/" target="_blank" rel="noreferrer">发布到 GitHub</a>
        </div>
      </section>
      <section class="hero-card" aria-label="行情预览">
        <div class="card-header">
          <span>Market Snapshot</span>
          <span class="status">Live Idea</span>
        </div>
        <div class="ticker">
          <strong>STOCK</strong>
          <span>+12.48%</span>
        </div>
        <div class="chart">
          <span style="height: 42%"></span>
          <span style="height: 56%"></span>
          <span style="height: 48%"></span>
          <span style="height: 72%"></span>
          <span style="height: 64%"></span>
          <span style="height: 85%"></span>
          <span style="height: 92%"></span>
        </div>
      </section>
    </main>

    <section class="features" id="features">
      <article>
        <h2>适合快速上线</h2>
        <p>纯 HTML + CSS，无需构建工具，上传后即可启用 Pages。</p>
      </article>
      <article>
        <h2>适合继续扩展</h2>
        <p>你后面可以很容易接入行情 API、博客文章、项目文档或自定义域名。</p>
      </article>
      <article>
        <h2>适合 stock 品牌</h2>
        <p>页面文案和视觉都围绕股票、趋势、数据感来设计，后续改名也方便。</p>
      </article>
    </section>
  </body>
</html>
